plugin:
  memory_vector_search:
    backend:
      info:
        name:
          other: In-Memory Vector Search
        description:
          other: Lightweight in-memory vector search for development and testing (no external dependencies)
      config:
        api_host:
          title:
            other: Embedding API Host
          description:
            other: "OpenAI-compatible API base URL for embedding generation (e.g. https://api.openai.com)"
        api_key:
          title:
            other: Embedding API Key
          description:
            other: API key for the embedding service
        embedding_model:
          title:
            other: Embedding Model
          description:
            other: "Model name for embedding generation (e.g. text-embedding-3-small)"
        embedding_level:
          title:
            other: Embedding Level
          description:
            other: "Choose 'question' to embed question + all answers + comments, or 'answer' to embed each answer separately"
        similarity_threshold:
          title:
            other: Similarity Threshold
          description:
            other: "Minimum cosine similarity score (0-1) for search results. Default 0 (no filtering)."
