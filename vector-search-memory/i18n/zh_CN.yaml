plugin:
  memory_vector_search:
    backend:
      info:
        name:
          other: 内存向量搜索
        description:
          other: 轻量级内存向量搜索，适用于开发和测试（无外部依赖）
      config:
        api_host:
          title:
            other: Embedding API 地址
          description:
            other: "用于生成 Embedding 的 OpenAI 兼容 API 地址（如 https://api.openai.com）"
        api_key:
          title:
            other: Embedding API 密钥
          description:
            other: Embedding 服务的 API 密钥
        embedding_model:
          title:
            other: Embedding 模型
          description:
            other: "Embedding 模型名称（如 text-embedding-3-small）"
        embedding_level:
          title:
            other: Embedding 级别
          description:
            other: "选择 'question' 将问题+所有回答+评论合并嵌入，或 'answer' 将每个回答单独嵌入"
          options:
            question:
              other: 问题
            answer:
              other: 回答
        similarity_threshold:
          title:
            other: 相似度阈值
          description:
            other: "搜索结果的最低余弦相似度分数（0-1）。默认为 0（不过滤）。"
