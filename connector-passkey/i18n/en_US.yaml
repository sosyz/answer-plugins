plugin:
  passkey_connector:
    backend:
      name:
        other: Passkey
      info:
        name:
          other: Passkey Connector
        description:
          other: Enable passwordless login with passkeys (WebAuthn)
      config:
        rp_name:
          title:
            other: Relying Party Name
          description:
            other: Display name for your site shown during passkey registration (e.g. "My Answer Community")
        rp_id:
          title:
            other: Relying Party ID
          description:
            other: Domain name of your site (e.g. "example.com"). Must match the domain users access.
        rp_origins:
          title:
            other: Allowed Origins
          description:
            other: Comma-separated list of allowed origins (e.g. "https://example.com"). Must include the protocol.
        attestation:
          title:
            other: Attestation Type
          description:
            other: Level of attestation required from authenticators.
          options:
            none:
              other: None
            indirect:
              other: Indirect
            direct:
              other: Direct
      user_config:
        manage_passkeys:
          other: Manage Passkeys
    frontend:
      login_title: Sign in with Passkey
      login_description: Use your fingerprint, face, or security key to sign in.
      login_button: Authenticate
      login_error: "Passkey authentication failed: ${ERROR}"
      login_cancelled: Authentication was cancelled.
      manage_title: Passkeys
      manage_description: Manage your registered passkeys for passwordless login.
      add_passkey: Add New Passkey
      passkey_name_label: Passkey Name
      passkey_name_placeholder: e.g. MacBook Touch ID
      register_error: "Passkey registration failed: ${ERROR}"
      register_success: Passkey registered successfully.
      delete_confirm: Are you sure you want to delete this passkey?
      delete_success: Passkey deleted successfully.
      delete_error: "Failed to delete passkey: ${ERROR}"
      no_passkeys: You haven't registered any passkeys yet.
      created: Created
      last_used: Last used
      never_used: Never
      cancel: Cancel
      delete: Delete
      save: Save
      loading: Loading...
      error_generic: An unexpected error occurred. Please try again.
      error_not_supported: Passkeys are not supported in this browser.
      test_passkey: Test
      test_success: Passkey verified successfully.
      test_error: "Passkey verification failed: ${ERROR}"
